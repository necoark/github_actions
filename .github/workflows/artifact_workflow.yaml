name: artifact workflow
on: push

jobs:
  first-job:
    runs-on: ubuntu-latest
    steps:
      - name: math expression
        run: expr 2 + 2 > math-result.txt
      - name: upload file result
        uses: actions/upload-artifact@v4
        with:
          name: math-result
          path: math-result.txt
  another-job:
    runs-on: ubuntu-latest
    steps:
      - name: download file
        uses: actions/download-artifact@v4
        with:
          name: math-result
      - name: math expr
        run: |
          value=`cat math-result.txt`
          expr $value \* 2 > math-result.txt
      - name: upload file result
        uses: actions/upload-artifact@v4
        with:
          name: math-result
          path: math-result.txt
  second-job:
    runs-on: ubuntu-latest
    needs: another-job
    steps:
      - name: download file
        uses: actions/download-artifact@v4
        with:
          name: math-result
      - name: print file
        run: |
          value=`cat math-result.txt`
          echo $value
